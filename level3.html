<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Archive - Level 4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="level1-body">
  <main class="level1-shell topic-shell">
    <div class="topic-toolbar">
      <form class="forum-search topic-search">
        <input type="text" placeholder="搜索帖子、关键词..." />
        <button type="submit">搜索</button>
      </form>
      <a class="ghost-link" href="level1.html">返回论坛</a>
    </div>

    <section class="topic-main">
      <article class="topic-card topic-head">
        <p class="post-tag">03 / 失效通知</p>
        <h1>旧登录系统从来没有真正关闭过</h1>
        <div class="topic-meta">管理员 · 1小时前 · 5 条回复</div>
      </article>

      <article class="topic-card topic-detail">
        <p>只要你知道正确的入口，哪怕它看起来像一封普通通知。</p>
        <p>这是一段占位内容，后续可以放登录入口提示、伪登录表单线索或系统残留字段。</p>
      </article>

      <div class="topic-replies">
        <div class="reply-card">
          <div class="reply-author">终端</div>
          <p>那条“通知”不是通知，它更像是一道门，只有在正确的时间看到才会打开。</p>
        </div>
        <div class="reply-card">
          <div class="reply-author">回声室</div>
          <p>我试了一下旧登录页，输入框并没有真正消失，只是被某种方式藏在了页面的边角。</p>
        </div>
        <div class="reply-card">
          <div class="reply-author">匿名用户</div>
          <p>如果你看见了“登录成功”，那很可能已经不是你原来想要的那个页面了。</p>
        </div>
      </div>

      <div class="buttons topic-actions">
        <button onclick="goToPage('level3.html')">返回第三关</button>
        <button onclick="goToPage('level1.html')">返回主页</button>
        <button onclick="goToPage('ending.html')">进入结局</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
