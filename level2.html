<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Archive - Level 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="level1-body">
  <main class="level1-shell topic-shell">
    <div class="topic-toolbar">
      <form class="forum-search topic-search">
        <input type="text" placeholder="搜索帖子、关键词..." />
        <button type="submit">搜索</button>
      </form>
      <a class="ghost-link" href="level1.html">返回论坛</a>
    </div>

    <section class="topic-main">
      <article class="topic-card topic-head">
        <p class="post-tag">01 / 旧站存档</p>
        <h1>为什么首页会在凌晨前被重写？</h1>
        <div class="topic-meta">匿名用户 · 3分钟前 · 4 条回复</div>
      </article>

      <article class="topic-card topic-detail">
        <p>有人说，系统会在某个时刻把所有“正常”的入口替换掉。</p>
        <p>这是一段占位内容，之后可以替换为真正的谜题线索、源码痕迹或隐藏文件说明。</p>
      </article>

      <div class="topic-replies">
        <div class="reply-card">
          <div class="reply-author">回声室</div>
          <p>我在源码里看见了一个被注释掉的时间戳，像是有人提前写好了替换逻辑。</p>
        </div>
        <div class="reply-card">
          <div class="reply-author">匿名用户</div>
          <p>凌晨前那段跳转并不是真的“重写”，更像是把本该存在的入口替换成了另一条路径。</p>
        </div>
        <div class="reply-card">
          <div class="reply-author">管理员</div>
          <p>如果你看见了异常跳转，先别急着点，先确认你是不是从“正常”的入口进来的。</p>
        </div>
      </div>

      <div class="buttons topic-actions">
        <button onclick="goToPage('level1.html')">返回论坛</button>
        <button onclick="goToPage('level3.html')">进入第三关</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
